{%extends 'base.html'%}

{%block title%}Profile{% endblock title%}
  
  
  {% block body %}      <!-- MAIN CONTENT -->
  <div class="container-fluid mt-4">
    <div class="row">

        <!-- DESKTOP SIDEBAR -->
        <div class="col-lg-2 d-none d-lg-block px-4">
            <div class="sidebar shadow-sm">
            <a href="/" class="{% if page == 'home' %}active{% endif %}"><i class="bi bi-house me-2"></i>Dashboard</a>
            <a href="/transaction" class="{% if page == 'transaction' %}active{% endif %}"><i class="bi bi-arrow-left-right me-2"></i>Transaction</a>
            <a href="/notify" class="{% if page == 'notification' %}active{% endif %}"><i class="bi bi-bell me-2"></i>Notification</a>
            <a href="/setting" class="{% if page == 'setting' %}active{% endif %}"><i class="bi bi-gear me-2"></i>Setting</a>
            <a href="/support" class="{% if page == 'support' %}active{% endif %}"><i class="bi bi-headset me-2"></i>Support & Help</a>
            <a href="/profile" class="{% if page == 'profile' %}active{% endif %}"><i class="bi bi-person-circle me-2"></i>Profile</a>
            <a href="/logout" class="{% if page == 'logout' %}active{% endif %}"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
            </div>
        </div>
<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">

            <div class="card shadow-sm">
                <div class="card-body text-center">

                    <i class="bi bi-person-circle fs-1 mb-3"></i>

                    <h4>{{ request.user.username }}</h4>
                    <p class="text-muted">{{ request.user.email }}</p>

                    <span class="badge bg-primary">
                        {{ request.user.profile.role }}
                    </span>

                    <hr>

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3 text-start">
                            <label class="form-label">Email</label>
                            <input type="email"
                                   class="form-control"
                                   name="email"
                                   value="{{ request.user.email }}">
                        </div>

                        <button class="btn btn-success w-100">
                            Update Profile
                        </button>
                    </form>

                    <hr>

                    <a href="{% url 'logout' %}" class="btn btn-danger w-100">
                        Logout
                    </a>

                </div>
            </div>

        </div>
    </div>

</div>

{% endblock %}
