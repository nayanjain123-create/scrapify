{%extends 'base.html'%}

{%block title%}Support{% endblock title%}
  
  
  {% block body %}      
  <!-- MAIN CONTENT -->
  <div class="container-fluid mt-4">
    <div class="row">

        <!-- DESKTOP SIDEBAR -->
        <div class="col-lg-2 d-none d-lg-block px-4">
            <div class="sidebar shadow-sm">
            <a href="/" class="{% if page == 'home' %}active{% endif %}"><i class="bi bi-house me-2"></i>Dashboard</a>
            <a href="/transaction" class="{% if page == 'transaction' %}active{% endif %}"><i class="bi bi-arrow-left-right me-2"></i>Transaction</a>
            <a href="/notify" class="{% if page == 'notification' %}active{% endif %}"><i class="bi bi-bell me-2"></i>Notification</a>
            <a href="/setting" class="{% if page == 'setting' %}active{% endif %}"><i class="bi bi-gear me-2"></i>Setting</a>
            <a href="/support" class="{% if page == 'support' %}active{% endif %}"><i class="bi bi-headset me-2"></i>Support & Help</a>
            <a href="/profile" class="{% if page == 'profile' %}active{% endif %}"><i class="bi bi-person-circle me-2"></i>Profile</a>
            <a href="/logout" class="{% if page == 'logout' %}active{% endif %}"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
            </div>
        </div>
        <div class="col-lg-10 col-md-9 p-4 d-flex justify-content-center">
            <div class="text-center w-100">

                <h3 class="mb-1">Support & Help</h3>
                <p class="text-muted mb-4">
                    Need assistance? Fill out the form below and our team will contact you.
                </p>

                <!-- Support Form -->
                <div class="card shadow-sm support-card mx-auto">
                    <div class="card-body">

                        <form>
                            <div class="mb-3 text-start">
                                <label class="form-label">Your Name</label>
                                <input type="text" class="form-control" placeholder="Enter your name">
                            </div>

                            <div class="mb-3 text-start">
                                <label class="form-label">Your Email</label>
                                <input type="email" class="form-control" placeholder="Enter your email">
                            </div>

                            <div class="mb-3 text-start">
                                <label class="form-label">Message</label>
                                <textarea class="form-control" rows="4" placeholder="Describe your issue..."></textarea>
                            </div>

                            <button type="submit" class="btn btn-success w-100">
                                Submit Request
                            </button>
                        </form>

                    </div>
                </div>

            </div>
        </div>

    </div>
</div>
{% endblock body%}
